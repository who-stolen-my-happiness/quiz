<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>大气物理 WX版权所有</title>
<style>
  :root{
    --bg:#f6f8fb; --card:#ffffff; --line:#e6ebf2; --text:#1f2937; --muted:#667085;
    --primary:#2563eb; --primary-soft:#dbeafe; --ok:#16a34a; --ok-soft:#dcfce7;
    --bad:#dc2626; --bad-soft:#fee2e2; --warn:#d97706; --shadow:0 10px 30px rgba(15,23,42,.08);
    --radius:18px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#f8fbff,#f5f7fb);color:var(--text)}
  .wrap{max-width:1080px;margin:0 auto;padding:16px 14px 40px}
  .hero{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border-radius:24px;padding:20px 18px;box-shadow:var(--shadow)}
  .hero h1{margin:0 0 8px;font-size:26px}
  .hero p{margin:0;opacity:.92;line-height:1.55}
  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:14px}
  .stat{background:rgba(255,255,255,.14);backdrop-filter: blur(6px);padding:12px;border-radius:16px}
  .stat .n{font-size:22px;font-weight:800;margin-bottom:4px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-top:14px}
  .toolbar{display:grid;grid-template-columns:1.2fr 1fr 1fr auto auto;gap:10px;align-items:center}
  select,input,textarea,button{font:inherit}
  select,input,textarea{width:100%;border:1px solid #d7deea;background:#fff;border-radius:14px;padding:12px 14px;outline:none}
  textarea{min-height:110px;resize:vertical;line-height:1.6}
  button{border:0;border-radius:14px;padding:12px 14px;font-weight:700;cursor:pointer;transition:.18s transform,.18s opacity,.18s background}
  button:active{transform:scale(.98)}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-ghost{background:#eef2ff;color:#31415e}
  .btn-soft{background:#f3f6fb;color:#31415e}
  .btn-danger{background:#fef2f2;color:#b91c1c}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .chip{padding:8px 12px;border-radius:999px;background:#f3f6fb;color:#475467;font-size:13px}
  .question-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}
  .qno{font-weight:800;color:var(--primary)}
  .qtype{font-size:13px;background:var(--primary-soft);color:#1d4ed8;padding:6px 10px;border-radius:999px}
  .question{font-size:19px;line-height:1.75;margin:6px 0 12px;white-space:pre-wrap}
  .question-image-wrap{margin:0 0 14px}
  .question-image-wrap summary{cursor:pointer;color:#1d4ed8;font-weight:700;margin-bottom:8px}
  .question-image{width:100%;max-width:760px;border:1px solid #d9e2f0;border-radius:16px;display:block;background:#fff}
  .tip{margin:0 0 10px;padding:10px 12px;border-radius:12px;background:#fff7ed;color:#9a3412;font-size:13px;line-height:1.6}
  .option-list{display:grid;gap:10px}
  .option{border:1px solid #d9e2f0;background:#fff;padding:14px;border-radius:16px;display:flex;gap:12px;align-items:flex-start;cursor:pointer}
  .option:hover{background:#f8fbff}
  .option.active{border-color:#3b82f6;background:#eef5ff}
  .mark{width:28px;height:28px;display:inline-grid;place-items:center;border-radius:50%;background:#edf2f7;color:#3b4a5c;font-weight:800;flex:0 0 28px}
  .option.active .mark{background:#2563eb;color:#fff}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .result{margin-top:14px;padding:14px;border-radius:16px;line-height:1.7}
  .ok{background:var(--ok-soft);color:#166534}
  .bad{background:var(--bad-soft);color:#991b1b}
  .muted{color:var(--muted)}
  .small{font-size:13px}
  .hidden{display:none}
  .entry-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .entry-btn{padding:16px 14px;text-align:left;border:1px solid var(--line);background:#fff;border-radius:18px}
  .entry-btn.active{border-color:#3b82f6;background:#eef5ff}
  .entry-btn .title{font-size:17px;font-weight:800;margin-bottom:6px}
  .entry-btn .desc{font-size:13px;color:#667085;line-height:1.6}
  .wrong-list,.fav-list{display:grid;gap:10px}
  .wrong-item,.fav-item{border:1px solid var(--line);border-radius:16px;padding:14px}
  .summary-box{border:1px dashed #d9e2f0;border-radius:16px;padding:14px;background:#fafcff;line-height:1.8}
  .summary-title{font-weight:800;margin-bottom:6px}
  .wrong-item h4,.fav-item h4{margin:0 0 6px}
  .footer{margin-top:20px;color:#667085;font-size:13px;line-height:1.7}
  .seg{display:inline-flex;background:#eef2f7;border-radius:12px;padding:4px}
  .seg button{padding:9px 12px;border-radius:10px;background:transparent}
  .seg button.active{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .inline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  @media (max-width:860px){
    .stats{grid-template-columns:repeat(3,1fr)}
    .toolbar{grid-template-columns:1fr 1fr}
    .entry-grid{grid-template-columns:1fr}
  }
  @media (max-width:760px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .question{font-size:18px}
    .hero h1{font-size:23px}
  }
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>大气物理 WX版权所有</h1>
    <p>本版增加了独立入口：主练习、错题练习、收藏练习。清空错题记录和清空收藏夹都不会再清掉当前做题进度、当前答案和浏览位置。</p>
    <div class="stats">
      <div class="stat"><div class="n" id="sChoice">290</div><div>选择题</div></div>
      <div class="stat"><div class="n" id="sBlank">53</div><div>填空题</div></div>
      <div class="stat"><div class="n" id="sWrong">0</div><div>错题数</div></div>
      <div class="stat"><div class="n" id="sDone">0</div><div>已作答</div></div>
      <div class="stat"><div class="n" id="sFav">0</div><div>已收藏</div></div>
      <div class="stat"><div class="n" id="sAttempt">0</div><div>总作答次数</div></div>
    </div>
  </section>

  <section class="card">
    <div class="entry-grid">
      <button class="entry-btn active" id="entryMain" type="button">
        <div class="title">主练习</div>
        <div class="desc">刷全部题目，支持顺序、随机、跳转、收藏和看答案。</div>
      </button>
      <button class="entry-btn" id="entryWrong" type="button">
        <div class="title">错题练习</div>
        <div class="desc">只刷错题，功能和主练习一致，但题目范围限定为错题。</div>
      </button>
      <button class="entry-btn" id="entryFav" type="button">
        <div class="title">收藏练习</div>
        <div class="desc">只刷收藏夹中的题目，功能和主练习一致。</div>
      </button>
    </div>
  </section>

  <section class="card">
    <div class="toolbar">
      <select id="modeSelect">
        <option value="choice">选择题</option>
        <option value="blank">填空题</option>
      </select>
      <div class="seg">
        <button id="orderBtn" class="active" type="button">顺序</button>
        <button id="randomBtn" type="button">随机</button>
      </div>
      <input id="jumpInput" type="number" min="1" placeholder="跳转题号" />
      <button class="btn-ghost" id="jumpBtn" type="button">跳转</button>
      <button class="btn-soft" id="exitScopeBtn" type="button">返回全部题目</button>
    </div>
    <div class="chips">
      <span class="chip" id="scopeChip">入口：主练习</span>
      <span class="chip" id="progressChip">当前：选择题 1 / 290</span>
      <span class="chip" id="accuracyChip">本类正确率：0%</span>
      <span class="chip" id="statusChip">模式：顺序</span>
    </div>
  </section>

  <section class="card" id="quizCard">
    <div class="question-head">
      <div>
        <div class="qno" id="qNo">第 1 题</div>
        <div class="muted small" id="qId">MC001</div>
      </div>
      <div class="qtype" id="qType">选择题</div>
    </div>
    <div class="question" id="qText"></div>

    <div id="questionImageWrap" class="question-image-wrap hidden">
      <details>
        <summary>查看该题所在页原图</summary>
        <img id="questionImage" class="question-image" alt="题目原图" />
      </details>
    </div>

    <div id="multiTip" class="tip hidden">这题是多选题，请把所有正确选项都选上后再提交。</div>

    <div id="choiceArea" class="option-list"></div>

    <div id="blankArea" class="hidden">
      <textarea id="blankInput" placeholder="请输入答案。填空题默认采用较宽松的关键词匹配。"></textarea>
    </div>

    <div class="actions">
      <button class="btn-primary" id="submitBtn" type="button">确认提交</button>
      <button class="btn-ghost" id="showAnswerBtn" type="button">直接看答案</button>
      <button class="btn-soft" id="prevBtn" type="button">上一题</button>
      <button class="btn-soft" id="nextBtn" type="button">下一题</button>
      <button class="btn-soft" id="toggleFavBtn" type="button">收藏本题</button>
      <button class="btn-soft" id="resetCurrentBtn" type="button">清空作答</button>
    </div>

    <div id="resultBox" class="result hidden"></div>
  </section>

  <section class="card">
    <div class="inline" style="justify-content:space-between">
      <h3 style="margin:0">错题记录</h3>
      <div class="inline">
        <button class="btn-soft" id="startWrongBtn" type="button">进入错题练习</button>
        <button class="btn-danger" id="clearWrongBtn" type="button">清空错题记录</button>
      </div>
    </div>
    <div id="wrongSummary" class="summary-box" style="margin-top:12px"></div>
  </section>

  <section class="card">
    <div class="inline" style="justify-content:space-between">
      <h3 style="margin:0">收藏夹</h3>
      <div class="inline">
        <button class="btn-soft" id="startFavBtn" type="button">进入收藏练习</button>
        <button class="btn-danger" id="clearFavBtn" type="button">清空收藏夹</button>
      </div>
    </div>
    <div id="favSummary" class="summary-box" style="margin-top:12px"></div>
  </section>
</div>

<script src="quiz_data.js?v=11"></script>
<script>
const data = window.QUIZ_DATA;
const STORAGE_KEY = 'atmos_quiz_demo_v4';
const state = loadState();
const sessionState = {
  main: { completed: { choice: [], blank: [] } },
  wrong: { answers: {}, completed: { choice: [], blank: [] } },
  fav: { answers: {}, completed: { choice: [], blank: [] } }
};

const els = {
  modeSelect: document.getElementById('modeSelect'),
  orderBtn: document.getElementById('orderBtn'),
  randomBtn: document.getElementById('randomBtn'),
  jumpInput: document.getElementById('jumpInput'),
  jumpBtn: document.getElementById('jumpBtn'),
  exitScopeBtn: document.getElementById('exitScopeBtn'),
  scopeChip: document.getElementById('scopeChip'),
  progressChip: document.getElementById('progressChip'),
  accuracyChip: document.getElementById('accuracyChip'),
  statusChip: document.getElementById('statusChip'),
  qNo: document.getElementById('qNo'),
  qId: document.getElementById('qId'),
  qType: document.getElementById('qType'),
  qText: document.getElementById('qText'),
  questionImageWrap: document.getElementById('questionImageWrap'),
  questionImage: document.getElementById('questionImage'),
  multiTip: document.getElementById('multiTip'),
  choiceArea: document.getElementById('choiceArea'),
  blankArea: document.getElementById('blankArea'),
  blankInput: document.getElementById('blankInput'),
  submitBtn: document.getElementById('submitBtn'),
  showAnswerBtn: document.getElementById('showAnswerBtn'),
  prevBtn: document.getElementById('prevBtn'),
  nextBtn: document.getElementById('nextBtn'),
  toggleFavBtn: document.getElementById('toggleFavBtn'),
  resetCurrentBtn: document.getElementById('resetCurrentBtn'),
  resultBox: document.getElementById('resultBox'),
  wrongSummary: document.getElementById('wrongSummary'),
  clearWrongBtn: document.getElementById('clearWrongBtn'),
  startWrongBtn: document.getElementById('startWrongBtn'),
  favSummary: document.getElementById('favSummary'),
  clearFavBtn: document.getElementById('clearFavBtn'),
  startFavBtn: document.getElementById('startFavBtn'),
  entryMain: document.getElementById('entryMain'),
  entryWrong: document.getElementById('entryWrong'),
  entryFav: document.getElementById('entryFav'),
  sChoice: document.getElementById('sChoice'),
  sBlank: document.getElementById('sBlank'),
  sWrong: document.getElementById('sWrong'),
  sDone: document.getElementById('sDone'),
  sFav: document.getElementById('sFav'),
  sAttempt: document.getElementById('sAttempt')
};

init();

function defaultState(){
  return {
    mode: 'choice',
    scope: 'main',
    random: false,
    indexMap: { choice: {main:0, wrong:0, fav:0}, blank:{main:0, wrong:0, fav:0} },
    history: {},
    answers: {},
    favorites: []
  };
}
function loadState(){
  try{
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const merged = Object.assign(defaultState(), saved);
    merged.indexMap = merged.indexMap || defaultState().indexMap;
    merged.indexMap.choice = Object.assign({main:0,wrong:0,fav:0}, merged.indexMap.choice || {});
    merged.indexMap.blank = Object.assign({main:0,wrong:0,fav:0}, merged.indexMap.blank || {});
    return merged;
  }catch(e){
    return defaultState();
  }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function init(){
  els.sChoice.textContent = data.meta.choiceCount;
  els.sBlank.textContent = data.meta.blankCount;
  els.modeSelect.value = state.mode;
  syncModeButtons();
  syncScopeButtons();
  bindEvents();
  renderQuestion();
  renderWrongSummary();
  renderFavSummary();
  renderStats();
}

function getList(){
  let list = data.questions[state.mode].slice();
  if(state.scope === 'wrong') list = list.filter(q => (state.history[q.id]?.wrongCount || 0) > 0);
  if(state.scope === 'fav'){
    const favSet = new Set(state.favorites || []);
    list = list.filter(q => favSet.has(q.id));
  }
  return list;
}
function currentIndex(){
  const max = Math.max(getList().length - 1, 0);
  const idx = state.indexMap[state.mode][state.scope] || 0;
  return Math.min(idx, max);
}
function setCurrentIndex(val){
  state.indexMap[state.mode][state.scope] = Math.max(0, val);
}
function currentQuestion(){
  const list = getList();
  return list.length ? list[currentIndex()] : null;
}
function isFavorite(id){ return (state.favorites || []).includes(id); }
function toggleFavorite(id){
  state.favorites = Array.isArray(state.favorites) ? state.favorites : [];
  const i = state.favorites.indexOf(id);
  if(i >= 0) state.favorites.splice(i,1); else state.favorites.unshift(id);
  saveState();
}
function isMultiChoice(q){ return q.type === 'choice' && String(q.answer || '').length > 1; }
function getAnswerStore(){
  return state.scope === 'main' ? state.answers : sessionState[state.scope].answers;
}
function getStoredChoiceAnswer(q){
  const val = getAnswerStore()[q.id];
  if(Array.isArray(val)) return val.slice().sort().join('');
  return String(val || '');
}
function scopeLabel(scope){ return scope === 'wrong' ? '错题练习' : (scope === 'fav' ? '收藏练习' : '主练习'); }

function getWrongCountdown(id){
  const h = state.history[id] || {};
  return Math.max(0, 5 - (h.wrongClearStreak || 0));
}
function getFavCountdown(id){
  const h = state.history[id] || {};
  return Math.max(0, 5 - (h.favClearStreak || 0));
}

function resetScopeSession(scope, mode = null){
  if(scope !== 'main'){
    sessionState[scope].answers = {};
  }
  if(mode){
    sessionState[scope].completed[mode] = [];
  }else{
    sessionState[scope].completed.choice = [];
    sessionState[scope].completed.blank = [];
  }
}
function markScopeCompleted(qid){
  const done = sessionState[state.scope].completed[state.mode];
  if(!done.includes(qid)) done.push(qid);
}
function maybePromptScopeRestart(forceLast = false){
  const list = getList();
  if(!list.length) return false;

  if(!forceLast){
    const done = sessionState[state.scope].completed[state.mode];
    const allDone = list.every(q => done.includes(q.id));
    if(!allDone) return false;
  }

  const label = state.scope === 'main' ? '当前主练习已完成' : (state.scope === 'fav' ? '当前收藏题目已完成' : '当前错题已完成');
  const yes = confirm(`${label}，是否从头开始？`);
  if(yes){
    if(state.scope === 'main'){
      list.forEach(q => { delete state.answers[q.id]; });
    }
    resetScopeSession(state.scope, state.mode);
    setCurrentIndex(0);
    saveState();
    renderQuestion();
  }
  return true;
}
function renderQuestion(){
  const q = currentQuestion();
  const list = getList();
  syncScopeButtons();
  if(!q){
    els.qNo.textContent = '暂无题目';
    els.qId.textContent = '';
    els.qType.textContent = state.mode === 'choice' ? '选择题' : '填空题';
    els.qText.textContent = state.scope === 'wrong' ? '当前没有错题可以练习。' : (state.scope === 'fav' ? '当前收藏夹里没有这类题目。' : '没有可显示的题目。');
    els.choiceArea.innerHTML = '';
    els.blankInput.value = '';
    els.blankArea.classList.add('hidden');
    els.questionImageWrap.classList.add('hidden');
    els.multiTip.classList.add('hidden');
    els.resultBox.classList.add('hidden');
    updateChips(0,0);
    return;
  }
  els.qNo.textContent = `第 ${q.number} 题`;
  els.qId.textContent = q.id;
  els.qType.textContent = isMultiChoice(q) ? '多选题' : (q.type === 'choice' ? '选择题' : '填空题');
  els.qText.textContent = q.question;
  els.resultBox.classList.add('hidden');
  els.resultBox.innerHTML = '';
  els.toggleFavBtn.textContent = isFavorite(q.id) ? '取消收藏' : '收藏本题';
  if(q.image){
    els.questionImage.src = q.image;
    els.questionImage.alt = q.imageAlt || '题目原图';
    els.questionImageWrap.classList.remove('hidden');
  }else{
    els.questionImageWrap.classList.add('hidden');
    els.questionImage.removeAttribute('src');
  }
  els.multiTip.classList.toggle('hidden', !isMultiChoice(q));
  if(q.type === 'choice'){
    els.choiceArea.innerHTML = '';
    els.choiceArea.classList.remove('hidden');
    els.blankArea.classList.add('hidden');
    const answerStore = getAnswerStore();
    const saved = answerStore[q.id] || (isMultiChoice(q) ? [] : '');
    const selected = new Set(Array.isArray(saved) ? saved : [saved].filter(Boolean));
    q.options.forEach(opt => {
      const div = document.createElement('div');
      div.className = 'option' + (selected.has(opt.label) ? ' active' : '');
      div.dataset.value = opt.label;
      div.innerHTML = `<div class="mark">${opt.label}</div><div>${escapeHtml(opt.text || ('选项 ' + opt.label))}</div>`;
      div.addEventListener('click', () => {
        if(isMultiChoice(q)){
          const answerStore = getAnswerStore();
          const arr = Array.isArray(answerStore[q.id]) ? answerStore[q.id].slice() : [];
          const i = arr.indexOf(opt.label);
          if(i >= 0) arr.splice(i,1); else arr.push(opt.label);
          arr.sort();
          answerStore[q.id] = arr;
        }else{
          getAnswerStore()[q.id] = opt.label;
        }
        saveState();
        renderQuestion();
      });
      els.choiceArea.appendChild(div);
    });
  }else{
    els.choiceArea.classList.add('hidden');
    els.blankArea.classList.remove('hidden');
    els.blankInput.value = getAnswerStore()[q.id] || '';
  }
  updateChips(currentIndex()+1, list.length);
  renderStats();
}

function updateChips(pos,total){
  const label = state.mode === 'choice' ? '选择题' : '填空题';
  els.scopeChip.textContent = `入口：${scopeLabel(state.scope)}`;
  els.progressChip.textContent = total ? `当前：${label} ${pos} / ${total}` : `当前：${label} 0 / 0`;
  const items = data.questions[state.mode];
  const stats = items.reduce((acc,q) => {
    const h = state.history[q.id];
    if(h?.attempts){ acc.attempts += h.attempts; acc.correct += h.correct || 0; }
    return acc;
  }, {attempts:0, correct:0});
  const rate = stats.attempts ? Math.round(stats.correct / stats.attempts * 100) : 0;
  els.accuracyChip.textContent = `本类正确率：${rate}%`;
  els.statusChip.textContent = `模式：${state.random ? '随机' : '顺序'}`;
}

function syncModeButtons(){
  els.orderBtn.classList.toggle('active', !state.random);
  els.randomBtn.classList.toggle('active', state.random);
}
function syncScopeButtons(){
  els.entryMain.classList.toggle('active', state.scope === 'main');
  els.entryWrong.classList.toggle('active', state.scope === 'wrong');
  els.entryFav.classList.toggle('active', state.scope === 'fav');
  els.exitScopeBtn.classList.toggle('hidden', state.scope === 'main');
}

function goNext(){
  const list = getList();
  if(!list.length) return;
  if(state.random){
    setCurrentIndex(Math.floor(Math.random() * list.length));
    saveState();
    renderQuestion();
    return;
  }

  const idx = currentIndex();
  const isLast = idx >= list.length - 1;
  if(isLast){
    if(maybePromptScopeRestart(true)) return;
    saveState();
    renderQuestion();
    return;
  }

  setCurrentIndex(idx + 1);
  saveState();
  renderQuestion();
}
function goPrev(){
  const list = getList(); if(!list.length) return;
  if(state.random) setCurrentIndex(Math.floor(Math.random()*list.length));
  else setCurrentIndex((currentIndex()-1+list.length) % list.length);
  saveState(); renderQuestion();
}
function jumpTo(no){
  const list = getList();
  const idx = list.findIndex(q => q.number === Number(no));
  if(idx === -1){ alert('当前入口和题型下没有这个题号。'); return; }
  setCurrentIndex(idx); saveState(); renderQuestion();
}
function switchScope(scope){
  const changed = state.scope !== scope;
  state.scope = scope;
  if(scope !== 'main' && changed){
    resetScopeSession(scope, state.mode);
    setCurrentIndex(0);
  }
  saveState();
  renderQuestion();
}

function recordAttempt(q, userAnswer, isCorrect){
  const h = state.history[q.id] || {
    attempts:0, correct:0, wrong:0, wrongCount:0, lastUserAnswer:'',
    wrongClearStreak:0, favClearStreak:0
  };
  h.attempts += 1;
  h.lastUserAnswer = userAnswer;
  if(isCorrect) h.correct += 1;
  else { h.wrong += 1; h.wrongCount += 1; }

  const inWrongPool = (h.wrongCount || 0) > 0;
  const inFavPool = isFavorite(q.id);

  if(inWrongPool){
    h.wrongClearStreak = isCorrect ? (h.wrongClearStreak || 0) + 1 : 0;
  }else{
    h.wrongClearStreak = 0;
  }

  if(inFavPool){
    h.favClearStreak = isCorrect ? (h.favClearStreak || 0) + 1 : 0;
  }else{
    h.favClearStreak = 0;
  }

  state.history[q.id] = h;
  if(state.scope === 'main'){
    state.answers[q.id] = isMultiChoice(q) ? String(userAnswer).split('') : userAnswer;
  }
  saveState();
}

function normalizeText(s){
  return (s || '').toLowerCase().replace(/[，,。.;；:：、（）()\[\]\s]/g,'').replace(/或/g,'').replace(/的/g,'');
}
function blankIsCorrect(user, answer){
  const u = normalizeText(user), a = normalizeText(answer);
  if(!u) return false;
  if(u === a || a.includes(u) || u.includes(a)) return true;
  const tokens = answer.replace(/（.*?）|\(.*?\)/g,' ').split(/[、，,;；。:\s]+/).map(x => normalizeText(x)).filter(Boolean);
  const uniq = [...new Set(tokens)];
  let hit = 0; uniq.forEach(t => { if(u.includes(t)) hit += 1; });
  return uniq.length ? (hit / uniq.length >= 0.6 || (uniq.length <= 2 && hit >= 1)) : false;
}
function submitCurrent(){
  const q = currentQuestion(); if(!q) return;
  let userAnswer = '';
  if(q.type === 'choice'){
    if(isMultiChoice(q)){
      const answerStore = getAnswerStore();
      const arr = Array.isArray(answerStore[q.id]) ? answerStore[q.id].slice().sort() : [];
      if(!arr.length){ alert('请先选择答案。'); return; }
      userAnswer = arr.join('');
    }else{
      userAnswer = getAnswerStore()[q.id] || '';
      if(!userAnswer){ alert('请先选择一个答案。'); return; }
    }
  }else{
    userAnswer = els.blankInput.value.trim();
    if(!userAnswer){ alert('请先输入答案。'); return; }
  }
  const correct = q.type === 'choice' ? normalizeText(userAnswer) === normalizeText(q.answer) : blankIsCorrect(userAnswer, q.answer);
  recordAttempt(q, userAnswer, correct);
  markScopeCompleted(q.id);
  maybePromptRemoval(q);
  showResult(q, userAnswer, correct, false);
  if(state.scope !== 'main'){
    delete sessionState[state.scope].answers[q.id];
  }
  renderWrongSummary(); renderFavSummary(); renderStats();
  if(!currentQuestion()) renderQuestion();
}


function showAnswerDirect(){
  const q = currentQuestion(); if(!q) return;
  const store = getAnswerStore();
  showResult(q, getStoredChoiceAnswer(q) || store[q.id] || '', false, true);
}
function showResult(q, userAnswer, correct, directView){
  els.resultBox.classList.remove('hidden');
  els.resultBox.className = 'result ' + (directView ? 'ok' : (correct ? 'ok' : 'bad'));
  const wrongTimes = state.history[q.id]?.wrongCount || 0;
  const answerHtml = q.type === 'choice' ? `正确答案：<strong>${escapeHtml(q.answer)}</strong>${resolveChoiceText(q)}` : `参考答案：<strong>${escapeHtml(q.answer)}</strong>`;
  const yourHtml = userAnswer ? `<div>你的答案：<strong>${escapeHtml(Array.isArray(userAnswer) ? userAnswer.join('') : userAnswer)}</strong></div>` : '';
  const topLine = directView ? `<div><strong>已显示答案</strong></div>` : (correct ? `<div><strong>回答正确</strong></div>` : `<div><strong>回答错误</strong></div>`);
  const parts = [`${topLine}${yourHtml}<div>${answerHtml}</div>`, `<div class="small muted" style="margin-top:8px">错题累计次数：${wrongTimes}</div>`];
  const h = state.history[q.id] || {};
  if((h.wrongCount || 0) > 0){
    parts.push(`<div class="small muted">当前该题已做对 <strong>${Math.min(5, h.wrongClearStreak || 0)}/5</strong> 次，满 5 次后可移出错题记录</div>`);
  }
  if(isFavorite(q.id)){
    parts.push(`<div class="small muted">当前该题已做对 <strong>${Math.min(5, h.favClearStreak || 0)}/5</strong> 次，满 5 次后可移出收藏夹</div>`);
  }
  els.resultBox.innerHTML = parts.join('');
}

function maybePromptRemoval(q){
  const h = state.history[q.id] || {};
  let changed = false;

  if((h.wrongCount || 0) > 0 && (h.wrongClearStreak || 0) >= 5){
    const yes = confirm(`第 ${q.number} 题已在错题练习相关记录中连续答对 5 次，是否将其移出错题记录？`);
    if(yes){
      h.wrong = 0;
      h.wrongCount = 0;
      h.wrongClearStreak = 0;
      changed = true;
      if(state.scope === 'wrong'){
        const oldIdx = currentIndex();
        state.history[q.id] = h;
        saveState();
        const lenAfter = getList().length;
        setCurrentIndex(Math.min(oldIdx, Math.max(lenAfter - 1, 0)));
      }
    }else{
      h.wrongClearStreak = 0;
      changed = true;
    }
  }

  if(isFavorite(q.id) && (h.favClearStreak || 0) >= 5){
    const yes = confirm(`第 ${q.number} 题已在收藏练习相关记录中连续答对 5 次，是否将其移出收藏夹？`);
    if(yes){
      state.favorites = (state.favorites || []).filter(id => id !== q.id);
      h.favClearStreak = 0;
      changed = true;
      if(state.scope === 'fav'){
        const oldIdx = currentIndex();
        state.history[q.id] = h;
        saveState();
        const lenAfter = getList().length;
        setCurrentIndex(Math.min(oldIdx, Math.max(lenAfter - 1, 0)));
      }
    }else{
      h.favClearStreak = 0;
      changed = true;
    }
  }

  state.history[q.id] = h;
  if(changed) saveState();
}
function resolveChoiceText(q){
  const labels = String(q.answer || '').split('');
  const items = labels.map(label => {
    const matched = q.options.find(x => x.label === label);
    if(matched && matched.text && !/^选项 [A-F]$/.test(matched.text) && matched.text !== label) return `${label}（${escapeHtml(matched.text)}）`;
    return label;
  });
  return items.length ? `：${items.join('；')}` : '';
}

function renderWrongSummary(){
  const entries = [...Object.entries(state.history)].filter(([,v]) => (v.wrongCount || 0) > 0);
  const total = entries.length;
  if(!total){
    els.wrongSummary.innerHTML = `<div class="summary-title">当前没有错题</div><div class="muted">你可以直接从上方入口进入主练习；做错的题会自动进入错题记录。</div>`;
    return;
  }
  const hardest = entries.sort((a,b) => (b[1].wrongCount||0) - (a[1].wrongCount||0))[0];
  const hardestQ = hardest ? findById(hardest[0]) : null;
  const hardestText = hardestQ ? `当前错题最多的是第 ${hardestQ.number} 题，累计错 ${hardest[1].wrongCount || 0} 次。` : '';
  els.wrongSummary.innerHTML = `
    <div class="summary-title">当前共有 ${total} 道错题</div>
    <div>点击“进入错题练习”后，会只刷错题，功能与主练习一致。</div>
    <div>在错题练习中，某题连续 <strong>5</strong> 次答对后，会提示是否将它移出错题记录。</div>
    <div class="muted">${hardestText}</div>
  `;
}
function renderFavSummary(){
  const favIds = Array.isArray(state.favorites) ? state.favorites : [];
  const total = favIds.length;
  if(!total){
    els.favSummary.innerHTML = `<div class="summary-title">收藏夹为空</div><div class="muted">做题时点击“收藏本题”即可加入收藏夹，然后从这里进入收藏练习。</div>`;
    return;
  }
  const lastId = favIds[0];
  const lastQ = findById(lastId);
  const lastText = lastQ ? `最近收藏的是第 ${lastQ.number} 题。` : '';
  els.favSummary.innerHTML = `
    <div class="summary-title">当前收藏了 ${total} 道题</div>
    <div>点击“进入收藏练习”后，会只刷收藏题，功能与主练习一致。</div>
    <div>在收藏练习中，某题连续 <strong>5</strong> 次答对后，会提示是否将它移出收藏夹。</div>
    <div class="muted">${lastText}</div>
  `;
}

function clearWrongRecords(){
  const keys = Object.keys(state.history || {});
  keys.forEach(id => {
    const h = state.history[id];
    if(!h) return;
    h.wrong = 0;
    h.wrongCount = 0;
    h.wrongClearStreak = 0;
    state.history[id] = h;
  });
  if(state.scope === 'wrong') state.scope = 'main';
  resetScopeSession('wrong');
  saveState();
  renderWrongSummary(); renderQuestion(); renderStats();
}
function clearFavoritesOnly(){
  state.favorites = [];
  Object.keys(state.history || {}).forEach(id => {
    const h = state.history[id];
    if(!h) return;
    h.favClearStreak = 0;
    state.history[id] = h;
  });
  if(state.scope === 'fav') state.scope = 'main';
  resetScopeSession('fav');
  saveState();
  renderFavSummary(); renderQuestion(); renderStats();
}

function findById(id){ return [...data.questions.choice, ...data.questions.blank].find(q => q.id === id); }
function openQuestion(id, scope = 'main'){
  const q = findById(id); if(!q) return;
  state.mode = q.type;
  const changed = state.scope !== scope;
  state.scope = scope;
  if(scope !== 'main' && changed){ resetScopeSession(scope, q.type); }
  const list = getListFor(q.type, scope);
  const idx = list.findIndex(x => x.id === id);
  state.indexMap[q.type][scope] = Math.max(0, idx);
  els.modeSelect.value = state.mode;
  saveState(); renderQuestion();
}
function getListFor(mode, scope){
  let list = data.questions[mode].slice();
  if(scope === 'wrong') list = list.filter(q => (state.history[q.id]?.wrongCount || 0) > 0);
  if(scope === 'fav'){
    const favSet = new Set(state.favorites || []);
    list = list.filter(q => favSet.has(q.id));
  }
  return list;
}
window.openQuestion = openQuestion;
function removeFavorite(id){ if(!isFavorite(id)) return; toggleFavorite(id); const h = state.history[id] || {}; h.favClearStreak = 0; state.history[id] = h; saveState(); renderFavSummary(); renderStats(); if(currentQuestion()?.id === id) renderQuestion(); }
window.removeFavorite = removeFavorite;

function renderStats(){
  const all = [...data.questions.choice, ...data.questions.blank];
  let wrong = 0, done = 0, attempts = 0;
  all.forEach(q => {
    const h = state.history[q.id];
    if(h?.attempts) done += 1;
    if(h?.attempts) attempts += h.attempts;
    if((h?.wrongCount || 0) > 0) wrong += 1;
  });
  els.sWrong.textContent = wrong;
  els.sDone.textContent = done;
  els.sFav.textContent = Array.isArray(state.favorites) ? state.favorites.length : 0;
  els.sAttempt.textContent = attempts;
}

function bindEvents(){
  els.modeSelect.addEventListener('change', e => { state.mode = e.target.value; if(state.scope !== 'main'){ resetScopeSession(state.scope, state.mode); setCurrentIndex(0); } saveState(); renderQuestion(); });
  els.orderBtn.addEventListener('click', () => { state.random = false; saveState(); syncModeButtons(); renderQuestion(); });
  els.randomBtn.addEventListener('click', () => { state.random = true; const len = getList().length; setCurrentIndex(len ? Math.floor(Math.random()*len) : 0); saveState(); syncModeButtons(); renderQuestion(); });
  els.jumpBtn.addEventListener('click', () => jumpTo(els.jumpInput.value));
  els.jumpInput.addEventListener('keydown', e => { if(e.key === 'Enter') jumpTo(els.jumpInput.value); });
  els.exitScopeBtn.addEventListener('click', () => switchScope('main'));
  els.entryMain.addEventListener('click', () => switchScope('main'));
  els.entryWrong.addEventListener('click', () => switchScope('wrong'));
  els.entryFav.addEventListener('click', () => switchScope('fav'));
  els.startWrongBtn.addEventListener('click', () => switchScope('wrong'));
  els.startFavBtn.addEventListener('click', () => switchScope('fav'));
  els.submitBtn.addEventListener('click', submitCurrent);
  els.showAnswerBtn.addEventListener('click', showAnswerDirect);
  els.prevBtn.addEventListener('click', goPrev);
  els.nextBtn.addEventListener('click', goNext);
  els.toggleFavBtn.addEventListener('click', () => { const q = currentQuestion(); if(!q) return; toggleFavorite(q.id); const h = state.history[q.id] || {}; if(!isFavorite(q.id)) h.favClearStreak = 0; state.history[q.id] = h; saveState(); renderQuestion(); renderFavSummary(); renderStats(); });
  els.resetCurrentBtn.addEventListener('click', () => { const q = currentQuestion(); if(!q) return; delete getAnswerStore()[q.id]; saveState(); renderQuestion(); });
  els.blankInput.addEventListener('input', e => { const q = currentQuestion(); if(!q) return; getAnswerStore()[q.id] = e.target.value; saveState(); });
  els.clearWrongBtn.addEventListener('click', () => { if(confirm('确定清空错题记录吗？这不会影响当前进度、作答记录和收藏。')) clearWrongRecords(); });
  els.clearFavBtn.addEventListener('click', () => { if(confirm('确定清空收藏夹吗？这不会影响当前进度和作答记录。')) clearFavoritesOnly(); });
}
function escapeHtml(str){ return String(str || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
</script>
